
spring.datasource.url=jdbc:mysql://localhost:3306/dev_company_db
spring.datasource.username=root
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



spring.datasource.hikari.maximum-pool-size=10


spring.datasource.hikari.idle-timeout=1800000


spring.datasource.hikari.connection-timeout=30000


spring.datasource.hikari.pool-name=DevelopmentCompanyHikariPool

spring.jpa.show-sql=true


spring.jpa.properties.hibernate.format_sql=true

logging.level.com.development=DEBUG